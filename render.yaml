services:
  - type: web
    name: band-auto-writer-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 180
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TZ
        value: Asia/Seoul
      - key: SECRET_KEY
        generateValue: true
      - key: SUPABASE_URL
        value: https://blbmdnygvoqyrovvlrrh.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: band-auto-writer-db
          property: connectionString
  - type: worker
    name: band-auto-writer-worker
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python worker.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TZ
        value: Asia/Seoul
      - key: DATABASE_URL
        fromDatabase:
          name: band-auto-writer-db
          property: connectionString

databases:
  - name: band-auto-writer-db
    plan: free
