services:
  - type: web
    name: band-auto-writer-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 180
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TZ
        value: Asia/Seoul
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: BAND_ACCESS_TOKEN
        sync: false

databases:
  - name: band-auto-writer-db
    plan: free
