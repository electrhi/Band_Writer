<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }} 로그인</title>
  <style>
    :root { --bg:#f6f7fb; --text:#172033; --muted:#667085; --primary:#5b21b6; --danger:#dc2626; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:radial-gradient(circle at top left,#ede9fe,transparent 28%), var(--bg); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif; color:var(--text); }
    .card { width:min(420px, calc(100vw - 32px)); background:rgba(255,255,255,.94); border:1px solid #e6e8ef; border-radius:28px; padding:34px; box-shadow:0 24px 70px rgba(15,23,42,.12); }
    .brand { width:54px; height:54px; border-radius:18px; background:linear-gradient(135deg,#6d28d9,#9333ea); color:white; display:grid; place-items:center; font-size:25px; font-weight:800; margin-bottom:20px; }
    h1 { margin:0 0 8px; font-size:28px; letter-spacing:-.04em; }
    p { margin:0 0 26px; color:var(--muted); line-height:1.55; }
    input { width:100%; border:1px solid #d0d5dd; border-radius:14px; padding:14px 16px; font-size:16px; outline:none; }
    input:focus { border-color:var(--primary); box-shadow:0 0 0 4px rgba(91,33,182,.12); }
    button { width:100%; margin-top:14px; border:0; border-radius:14px; padding:14px 16px; background:var(--primary); color:white; font-weight:800; font-size:16px; cursor:pointer; }
    .flash { padding:12px 14px; border-radius:14px; margin-bottom:14px; background:#fef2f2; color:var(--danger); font-weight:700; }
  </style>
</head>
<body>
  <form class="card" method="post">
    <div class="brand">B</div>
    <h1>{{ app_name }}</h1>
    <p>관리자 비밀번호를 입력하세요.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}<div class="flash">{{ message }}</div>{% endfor %}
    {% endwith %}
    <input name="password" type="password" placeholder="관리자 비밀번호" autofocus required>
    <button type="submit">로그인</button>
  </form>
</body>
</html>
